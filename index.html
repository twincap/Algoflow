<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AlgoFlow 연구소</title>
  <link rel="stylesheet" href="./styles.css?v=20260612b">
</head>
<body>
  <div class="app-shell">
    <header class="hud-strip" aria-label="시스템 현황">
      <section class="metric-stack" aria-label="자금">
        <div class="metric-card">
          <span class="metric-icon money"></span>
          <div>
            <span class="metric-label">자금</span>
            <strong id="funds-display">$12.4k</strong>
          </div>
          <small id="funds-rate">+0/s</small>
        </div>
      </section>

      <nav class="quick-nav" aria-label="연구소 보기">
        <button class="icon-button active" type="button" title="네트워크" aria-label="네트워크">
          <span class="home-mark"></span>
        </button>
        <button class="icon-button" type="button" title="연구" aria-label="연구">
          <span class="gear-mark"></span>
        </button>
      </nav>
    </header>

    <main class="workspace">
      <aside class="library-panel panel-surface" aria-label="노드 라이브러리">
        <div class="panel-heading">
          <span>노드 라이브러리</span>
          <small id="library-count">0</small>
        </div>
        <div class="category-tabs" id="category-tabs" role="tablist" aria-label="노드 분류"></div>
        <div class="node-palette" id="node-palette"></div>
      </aside>

      <section class="canvas-wrap" id="canvas-wrap" aria-label="파이프라인 캔버스">
        <svg id="connections" aria-hidden="true"></svg>
        <canvas id="particle-canvas" aria-hidden="true"></canvas>
        <div class="node-layer" id="canvas"></div>
        <div class="canvas-readout">
          <span>노드 <strong id="node-count">1</strong></span>
          <span>연결 <strong id="conn-count">0</strong></span>
          <span id="status-msg">노드를 클릭해 연결을 시작하세요.</span>
        </div>
        <div class="drag-ghost" id="drag-ghost"></div>
      </section>

      <aside class="mission-panel panel-surface" aria-label="연구소 상태">
        <section class="panel-block">
          <div class="panel-heading">
            <span>목표</span>
            <small id="objective-count">0/0</small>
          </div>
          <div class="objective-list" id="challenge-list"></div>
        </section>

        <section class="panel-block">
          <div class="panel-heading">
            <span>업적</span>
            <small id="achievement-count">0/0</small>
          </div>
          <div class="achievement-list" id="achievement-list"></div>
        </section>
      </aside>
    </main>

    <footer class="bottom-console">
      <section class="selection-panel panel-surface" aria-label="선택한 노드">
        <div class="panel-heading">
          <span>선택한 노드</span>
          <small id="selected-type">없음</small>
        </div>
        <div id="node-info" class="node-info empty">노드를 선택하면 처리율과 업그레이드를 볼 수 있습니다.</div>
      </section>

    </footer>

    <div class="context-menu" id="ctx-menu" role="menu">
      <button type="button" id="ctx-duplicate">노드 복제</button>
      <button type="button" id="ctx-delete" class="danger">노드 삭제</button>
    </div>
  </div>

  <script src="./app.js?v=20260612b"></script>
</body>
</html>
